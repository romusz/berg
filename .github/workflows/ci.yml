name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-msrv:
    name: Test (MSRV 1.92)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92
      - uses: Swatinem/rust-cache@v2
        # rust-toolchain.toml pins the dev toolchain and would otherwise override
        # the toolchain selected above, so force 1.92 explicitly to test the MSRV.
      - run: cargo +1.92 test --workspace --all-targets --locked

  test-stable:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        # rust-toolchain.toml pins the dev toolchain and would otherwise override
        # the toolchain installed above, so force `stable` to track latest stable.
      - run: cargo +stable test --workspace --all-targets --locked

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
